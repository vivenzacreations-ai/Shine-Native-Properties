<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Tailwind CSS -->

    <!-- Google Fonts -->

    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #fffdfc;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        h1, h2, h3, .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .gradient-text { 
            background: linear-gradient(135deg, #f43f5e 0%, #f97316 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        /* Floating animations for hero images */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-float-delayed { animation: float 6s ease-in-out 3s infinite; }
        
        /* Marquee animations */
        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 25s linear infinite;
        }

        /* Fade in animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
    </style>
</head>

            );
        };

        const FloatingActivity = () => {
            const [activeMsg, setActiveMsg] = useState("");
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const cycleNotification = () => {
                    const randomMsg = LIVE_NOTIFICATIONS[Math.floor(Math.random() * LIVE_NOTIFICATIONS.length)];
                    setActiveMsg(randomMsg);
                    setIsVisible(true);
                    setTimeout(() => setIsVisible(false), 4000);
                };
                const initialTimer = setTimeout(cycleNotification, 3000);
                const intervalTimer = setInterval(cycleNotification, 12000);
                return () => { clearTimeout(initialTimer); clearInterval(intervalTimer); };

                                                            <button onClick={() => updateQty(item.id, 1)} className="w-6 h-6 flex items-center justify-center text-rose-600 bg-white rounded-full shadow-sm"><Icon name="plus" className="w-3 h-3" /></button>
                                                        </div>
                                                        <button onClick={() => removeItem(item.id)} className="text-gray-400 hover:text-rose-500 p-2 bg-gray-50 rounded-full"><Icon name="trash" className="w-4 h-4" /></button>
                                                    </div>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                
                                <div className="lg:w-1/3">
                                    <div className="bg-white rounded-[2rem] border border-rose-50 shadow-sm p-6 sticky top-36">
                                        <h3 className="text-lg font-bold text-gray-900 mb-6 pb-4 border-b border-gray-100">Order Summary</h3>
                                        <div className="flex justify-between items-center text-xl font-bold text-gray-900 mb-8">
                                            <span>Total</span>
                                            <span className="text-rose-600">₹{getCartTotal()}</span>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            <button onClick={handleWhatsAppCheckout} className="w-full bg-[#25D366] text-white py-4 rounded-full font-bold hover:bg-[#20bd5a] transition shadow-lg flex justify-center items-center gap-2 transform hover:-translate-y-1">
                                                <Icon name="whatsapp" className="w-6 h-6" />
                                                Order via WhatsApp
                                            </button>

                                            <div className="relative flex py-2 items-center">
                                                <div className="flex-grow border-t border-gray-200"></div>
                                                <span className="flex-shrink-0 mx-4 text-gray-400 text-xs uppercase tracking-wider font-bold">Or</span>
                                                <div className="flex-grow border-t border-gray-200"></div>
                                            </div>

                                            <button onClick={handleStandardCheckout} disabled={isCheckingOut} className="w-full bg-gray-900 text-white py-4 rounded-full font-bold hover:bg-gray-800 transition shadow-md flex justify-center items-center">
                                                {isCheckingOut ? "Processing..." : "Proceed to Checkout"}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const Footer = () => (
            <footer className="bg-white border-t border-rose-50 pt-12 pb-8 mt-auto relative z-10">
                <div className="max-w-7xl mx-auto px-4 text-center">
                    <h3 className="font-serif text-2xl font-bold text-rose-900 mb-3 flex items-center justify-center gap-2">
                        <Icon name="heart" className="w-5 h-5 text-rose-500" />
                        Crafty Cure
                    </h3>
                    <p className="text-gray-500 text-sm mb-6">Handcrafted in Bhuj, Kutch.</p>
                    <p className="text-xs text-gray-400">© {new Date().getFullYear()} Crafty Cure Studio. All rights reserved.</p>
                </div>
            </footer>
        );

        // --- MAIN APP RENDER ---
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [cart, setCart] = useState([]);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '' });

            const navigate = (page) => {
                setCurrentPage(page);
                setIsMobileMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const showToast = (message) => {
                setToast({ show: true, message });
                setTimeout(() => setToast({ show: false, message: '' }), 3000);
            };

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
                    return [...prev, { ...product, quantity: 1 }];
                });
                showToast(`✨ Added ${product.name} to cart!`);
            };

            const cartCount = cart.reduce((count, item) => count + item.quantity, 0);

            return (
                <div className="flex flex-col min-h-screen pt-[110px]"> 
                    <HeaderWrapper 
                        currentPage={currentPage} 
                        navigate={navigate} 
                        cartCount={cartCount} 
                        isMobileMenuOpen={isMobileMenuOpen} 
                        setIsMobileMenuOpen={setIsMobileMenuOpen} 
                    />
                    
                    <main className="flex-grow">
                        {currentPage === 'home' && <HomeView navigate={navigate} addToCart={addToCart} />}
                        {currentPage === 'shop' && <ShopView addToCart={addToCart} />}
                        {currentPage === 'reviews' && <ReviewsView />}
                        {currentPage === 'about' && <AboutView />}
                        {currentPage === 'cart' && <CartView cart={cart} setCart={setCart} navigate={navigate} showToast={showToast} />}
                    </main>
                    
                    <Footer />
                    <Toast toast={toast} />
                    <FloatingActivity />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
